name: Growth-advisor reply handler

on:
  schedule:
    - cron: "*/5 * * * *"  # check for replies every ~5 minutes
  workflow_dispatch:

# Stateless; commits nothing.
concurrency:
  group: advisor-reply
  cancel-in-progress: false

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Answer any pending replies
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_CLEARER_THINKING: ${{ secrets.BEEHIIV_PUB_CLEARER_THINKING }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADVISOR_MODEL: ${{ secrets.ADVISOR_MODEL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: python advisor_reply.py
