name: Fetch dashboard snapshot

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:  # allow manual runs from the Actions UI

permissions:
  contents: write  # so the bot can commit the updated snapshot

concurrency:
  group: fetch-snapshot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Higher than the default: the beehiiv subscriber pass cursor-pages the full list
    # (offset pagination is capped at 10k), which adds a few minutes. Cron is every 30 min.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_snapshot.py
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_CLEARER_THINKING: ${{ secrets.BEEHIIV_PUB_CLEARER_THINKING }}
          OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python fetch_snapshot.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- frontend/public/snapshot.json; then
            echo "No snapshot changes."
            exit 0
          fi
          git add frontend/public/snapshot.json
          git commit -m "snapshot: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
